name: Update GCC Prices

on:
  schedule:
    - cron: "0 */12 * * *"  # every 12 hours
  workflow_dispatch:        # manual trigger

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false  # We'll set remote with token manually

      # 2️⃣ Set up Python
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      # 4️⃣ Run your fetch_prices.py
      - name: Run fetch_prices.py
        run: python fetch_prices.py

      # 5️⃣ Commit and push updated JSON files
      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json history.json
          git commit -m "Automatic update of prices.json and history.json" || echo "No changes to commit"

          # Set remote URL using token to allow push
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/mana90/gcc-prices.git
          git push origin HEAD:main
